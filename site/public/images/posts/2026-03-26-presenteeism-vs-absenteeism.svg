<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif">

  <!-- Background -->
  <rect width="680" height="280" rx="12" fill="#0f1117"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600" letter-spacing="0.5">「見える欠勤」と「見えない欠勤」</text>

  <!-- Divider line -->
  <line x1="340" y1="54" x2="340" y2="240" stroke="#1e293b" stroke-width="2"/>

  <!-- ===== Left: アブセンティーズム ===== -->
  <rect x="30" y="58" width="290" height="50" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5"/>
  <text x="175" y="79" text-anchor="middle" fill="#93c5fd" font-size="11">欠勤 / 休職</text>
  <text x="175" y="98" text-anchor="middle" fill="#dbeafe" font-size="16" font-weight="700">アブセンティーズム</text>

  <!-- Icon area left -->
  <rect x="80" y="124" width="200" height="72" rx="8" fill="#0f1f3d"/>

  <!-- Person icon - absent (crossed out) -->
  <circle cx="145" cy="148" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="145" y="153" text-anchor="middle" fill="#60a5fa" font-size="14">✕</text>
  <rect x="131" y="164" width="28" height="22" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>

  <text x="200" y="153" text-anchor="middle" fill="#94a3b8" font-size="11">職場に</text>
  <text x="200" y="169" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600">いない</text>
  <text x="200" y="186" text-anchor="middle" fill="#64748b" font-size="10">数値化しやすい</text>

  <text x="175" y="220" text-anchor="middle" fill="#475569" font-size="11">欠勤日数・休職期間で把握できる</text>

  <!-- ===== Right: プレゼンティーズム ===== -->
  <rect x="360" y="58" width="290" height="50" rx="8" fill="#3b1f5e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="505" y="79" text-anchor="middle" fill="#c4b5fd" font-size="11">出社しているのに仕事にならない</text>
  <text x="505" y="98" text-anchor="middle" fill="#ede9fe" font-size="16" font-weight="700">プレゼンティーズム</text>

  <!-- Icon area right -->
  <rect x="410" y="124" width="200" height="72" rx="8" fill="#1a0f3d"/>

  <!-- Person icon - present but struggling -->
  <circle cx="475" cy="148" r="14" fill="#3b1f5e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="475" y="153" text-anchor="middle" fill="#a78bfa" font-size="14">…</text>
  <rect x="461" y="164" width="28" height="22" rx="4" fill="#3b1f5e" stroke="#8b5cf6" stroke-width="1.5"/>

  <text x="530" y="153" text-anchor="middle" fill="#94a3b8" font-size="11">職場に</text>
  <text x="530" y="169" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">いるけど…</text>
  <text x="530" y="186" text-anchor="middle" fill="#64748b" font-size="10">数値化しにくい</text>

  <text x="505" y="220" text-anchor="middle" fill="#475569" font-size="11">不調を抱えたまま出社している状態</text>

  <!-- VS badge -->
  <circle cx="340" cy="148" r="18" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="340" y="153" text-anchor="middle" fill="#64748b" font-size="12" font-weight="700">VS</text>

  <!-- Bottom note -->
  <text x="340" y="262" text-anchor="middle" fill="#475569" font-size="10">企業の生産性損失の多くは、見えにくいプレゼンティーズム側から来ている</text>

</svg>
