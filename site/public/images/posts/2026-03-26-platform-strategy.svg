<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif">

  <!-- Background -->
  <rect width="680" height="260" rx="12" fill="#0f1117"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600" letter-spacing="0.5">プラットフォーム戦略：役割を分ける</text>

  <!-- ===== X (Twitter) Block ===== -->
  <rect x="40" y="56" width="220" height="160" rx="10" fill="#0d1b2a" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- X logo area -->
  <rect x="40" y="56" width="220" height="44" rx="10" fill="#1d3a6e"/>
  <rect x="40" y="80" width="220" height="20" fill="#1d3a6e"/>
  <text x="150" y="84" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="800">𝕏</text>

  <text x="150" y="122" text-anchor="middle" fill="#bfdbfe" font-size="13" font-weight="600">集客・発見</text>
  <text x="150" y="141" text-anchor="middle" fill="#64748b" font-size="10">トップ・オブ・ファネル</text>

  <!-- Bullets -->
  <text x="62" y="163" fill="#94a3b8" font-size="11">▸ 記事の切り抜き投稿</text>
  <text x="62" y="180" fill="#94a3b8" font-size="11">▸ 予告・一言コメント</text>
  <text x="62" y="197" fill="#94a3b8" font-size="11">▸ 新規読者の獲得</text>

  <text x="150" y="222" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="500">KPI：フォロワー数（到達範囲）</text>

  <!-- ===== Arrow ===== -->
  <text x="340" y="138" text-anchor="middle" fill="#475569" font-size="26">→</text>
  <text x="340" y="158" text-anchor="middle" fill="#475569" font-size="9">読者を</text>
  <text x="340" y="170" text-anchor="middle" fill="#475569" font-size="9">送り込む</text>

  <!-- ===== note Block ===== -->
  <rect x="420" y="56" width="220" height="160" rx="10" fill="#1a0a2e" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- note header -->
  <rect x="420" y="56" width="220" height="44" rx="10" fill="#3b1f5e"/>
  <rect x="420" y="80" width="220" height="20" fill="#3b1f5e"/>
  <text x="530" y="85" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="800">note</text>

  <text x="530" y="122" text-anchor="middle" fill="#ddd6fe" font-size="13" font-weight="600">定着・収益化</text>
  <text x="530" y="141" text-anchor="middle" fill="#64748b" font-size="10">コンバージョン層</text>

  <!-- Bullets -->
  <text x="442" y="163" fill="#94a3b8" font-size="11">▸ じっくり読める長文記事</text>
  <text x="442" y="180" fill="#94a3b8" font-size="11">▸ フォロワーを育てる</text>
  <text x="442" y="197" fill="#94a3b8" font-size="11">▸ 有料読者に転換</text>

  <text x="530" y="222" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="500">KPI：フォロワー数（収益化指標）</text>

  <!-- Bottom -->
  <text x="340" y="248" text-anchor="middle" fill="#475569" font-size="10">KPIは混ぜない。Xは「広さ」、noteは「深さ」で別々に管理する。</text>

</svg>
